<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#0f172a;display:flex;justify-content:center;}
.container{width:100%;max-width:380px;padding:20px;}
.titulo{color:white;text-align:center;font-size:26px;}
.linea{width:60%;height:2px;background:white;margin:10px auto 20px auto;}
.grupo{margin-bottom:12px;}
.label{background:#e5e7eb;padding:12px;border:2px solid #2f5597;text-align:center;font-weight:bold;}
.input{width:100%;padding:12px;border:2px solid #2f5597;text-align:center;}
.boton{width:100%;padding:14px;margin-top:10px;border:2px solid #2f5597;background:#e5e7eb;font-weight:bold;}
.resultado{color:white;text-align:center;font-size:22px;margin-top:12px;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<div class="titulo">APDAYC</div>
<div class="linea"></div>

<div class="grupo">
<div class="label">Tipo</div>
<select class="input" id="tipo" onchange="cambiarTipo()">
<option value="secundaria">Secundaria</option>
<option value="indispensable">Indispensable</option>
</select>
</div>

<div class="grupo"><div class="label">Nombre</div><input class="input"></div>
<div class="grupo"><div class="label">Dirección</div><input class="input"></div>

<div class="grupo">
<div class="label">Giro</div>
<select class="input" id="giro" onchange="actualizarCampos()"></select>
</div>

<!-- SECUNDARIA -->
<div id="secForm">

<div id="asientosSecDiv" class="grupo" style="display:none;">
<div class="label" id="labelAsientos">Asientos</div>
<input class="input" id="asientosSec">
</div>

<div id="m2SecDiv" class="grupo">
<div class="label">m²</div>
<input class="input" id="m2Sec">
</div>

<div class="grupo"><div class="label">Horas</div><input class="input" id="horas"></div>
<div class="grupo"><div class="label">Días</div><input class="input" id="dias"></div>

</div>

<!-- INDISPENSABLE -->
<div id="indForm" style="display:none;">

<div class="grupo"><div class="label">Asientos</div><input class="input" id="asientos"></div>
<div class="grupo"><div class="label">m²</div><input class="input" id="m2"></div>

<div class="grupo">
<div class="label">Días</div>
<select class="input" id="diasSemana">
<option value="1">1 día (5 días al mes)</option>
<option value="2">2 días (9 días al mes)</option>
<option value="3">3 días (13 días al mes)</option>
<option value="4">4 días (18 días al mes)</option>
<option value="5">5 días (22 días al mes)</option>
<option value="6">6 días (25 días al mes)</option>
<option value="7">7 días (30 días al mes)</option>
</select>
</div>

<div class="grupo">
<div class="label">Entrada</div>
<select class="input" id="entradaTipo" onchange="cambiarEntrada()">
<option value="sin">Sin costo</option>
<option value="con">Con costo</option>
</select>
</div>

<div id="fijoDiv" class="grupo">
<div class="label">Valor fijo S/ 7.50</div>
</div>

<div id="precioDiv" class="grupo" style="display:none;">
<div class="label">Precio entrada</div>
<input class="input" id="precio">
</div>

</div>

<button class="boton" onclick="calcular()">Calcular Tarifa</button>

<div id="resultado" class="resultado">S/ 0.00</div>

<button class="boton" onclick="descargarPDF()">Exportar PDF</button>

</div>

<script>

let totalFinal=0;

/* GIROS */
const sec = ["Hotel","Gimnasio","Restaurante","Servicios de salud","Tienda comercial","Peluquería","Banco","Notaria","Otros"];
const ind = ["Bar/Discoteca","Restobar","Academia de bailes","Cantina","Tragamonedas","Eventos"];

function cargarGiros(){
let lista = tipo.value=="secundaria"?sec:ind;
giro.innerHTML="";
lista.forEach(g=>giro.innerHTML+=`<option>${g}</option>`);
actualizarCampos();
}

function cambiarTipo(){
secForm.style.display = tipo.value=="secundaria"?"block":"none";
indForm.style.display = tipo.value=="indispensable"?"block":"none";
cargarGiros();
}

function actualizarCampos(){
let g = giro.value;
let esRestaurante = g=="Restaurante";
let esGimnasio = g=="Gimnasio";

asientosSecDiv.style.display = (tipo.value=="secundaria" && (esRestaurante || esGimnasio))?"block":"none";
m2SecDiv.style.display = (tipo.value=="secundaria" && (esRestaurante || esGimnasio))?"none":"block";

labelAsientos.innerText = esGimnasio ? "Máquinas" : "Asientos";
}

function cambiarEntrada(){
fijoDiv.style.display = entradaTipo.value=="sin"?"block":"none";
precioDiv.style.display = entradaTipo.value=="con"?"block":"none";
}

/* % secundaria */
function porcentaje(m){
if(m<=15)return 0.60;
if(m<=25)return 0.57;
if(m<=50)return 0.462;
if(m<=75)return 0.378;
if(m<=100)return 0.342;
if(m<=150)return 0.336;
if(m<=200)return 0.306;
if(m<=250)return 0.288;
if(m<=300)return 0.282;
if(m<=400)return 0.276;
if(m<=500)return 0.252;
if(m<=600)return 0.24;
if(m<=800)return 0.222;
if(m<=1000)return 0.198;
if(m<=1500)return 0.168;
if(m<=2000)return 0.138;
return 0.12;
}

function calcular(){

if(tipo.value=="secundaria"){

let base=2.5*0.35;
let h=horas.value||0;
let d=dias.value||0;

let m2Val = Number(m2Sec.value)||0;
let val = Number(asientosSec.value||m2Val);

let p = porcentaje(m2Val);

totalFinal = base * (val * p) * h * d * 0.03;

}else{

let asientosVal = Number(asientos.value)||0;
let m2Val = Number(m2.value)||0;

let aforo = asientosVal + m2Val;
let aforo60 = aforo * 0.60;

let entrada = (entradaTipo.value=="sin") ? 7.5 : (Number(precio.value)||0);
let factor = (entradaTipo.value=="sin") ? 0.08 : 0.05;

/* usar días 1–7 */
let dias = Number(diasSemana.value);

/* base correcta */
let base = aforo60 * entrada * factor;

/* resultado final */
totalFinal = base * dias;
}

resultado.innerText="S/ "+Number(totalFinal).toFixed(2);
}

/* PDF SIMPLE (como tu formato) */
function descargarPDF(){

let tipoTexto = tipo.value == "secundaria" ? "SECUNDARIA" : "INDISPENSABLE";

let contenido = `
<html>
<body style="font-family:Arial;padding:20px;">

<h3 style="text-align:center;">CÁLCULO DE TARIFA: ${tipoTexto}</h3>

<br>

<b>Datos:</b><br><br>

Asientos: ${asientos.value || asientosSec.value || 0}<br>
m²: ${m2.value || m2Sec.value || 0}

<br><br>

<b>Desglose:</b><br><br>

1) Aforo = Asientos + m²<br>
2) Aplicar 60%<br>
3) Multiplicar por entrada<br>
4) Multiplicar por días<br>
5) Aplicar factor (5% o 8%)

<br><br>

<b>Resultado final:</b> ${resultado.innerText}

</body>
</html>
`;

let w = window.open('');
w.document.write(contenido);
w.document.close();
w.print();
}

window.onload=cargarGiros;

</script>

</body>
</html>
